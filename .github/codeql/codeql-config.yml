name: litestar-pagination CodeQL

query-filters:
  # Ruff enforces unused imports with Python 3.12+ syntax support; CodeQL's
  # py/unused-import currently reports false positives for postponed
  # annotations and PEP 695 generic bases used throughout the library.
  - exclude:
      id: py/unused-import
  # PEP 695 generic class syntax (Python 3.12+) can trigger CodeQL extraction
  # "Syntax error" diagnostics even though the code is valid; CI pins Python 3.12
  # via setup-python before init so autobuild sees the project interpreter.

paths:
  - litestar_pagination

paths-ignore:
  - tests/**
  - docs/**
